to CEIPAL API. CEIPAL v1 API allows the customers to extract the data from their account to build any customized solutions as needed.\u0026lt;/span\u003e\u0026lt;/p\u003e\u0026lt;br\u003e\u0026lt;p\u003e\u0026lt;span style=\"background-color:rgb(255,255,255);color:rgb(105,118,137);\"\u003eRate limiting of the API is based on user authentication token and this is applicable to all authenticated endpoints. Once the rate limit is reached all the endpoints would return 400 error code.\u0026lt;/span\u003e\u0026lt;/p\u003e\u0026lt;br\u003e\u0026lt;p\u003e\u0026lt;span style=\"color:rgb(105,118,137);\"\u003eAll API requests must be made over HTTPS. Calls made over plain HTTP will fail.\u0026lt;/span\u003e\u0026lt;/p\u003e\u0026lt;br\u003e\u0026lt;p\u003eWe have introduced new endpoints and made significant changes to the existing endpoints. Now all the endpoints are using the encrypted ids to enhance the data security. Please reach out to your CEIPAL account representative for more details as how to generate the API credentials to start using the endpoints.\u0026lt;/p\u003e\u0026lt;br\u003e","slug":"ceipal-ats-v1-api-reference","sectionId":"63ec78dd3e80389eda35e252","isHeader":false,"openDefault":false,"subItems":[],"isPrivate":false,"viewers":[],"externalPageLink":"","isNewTab":false,"method":"","urls":{},"_id":"680a49d317a5f52532a918b6"},{"name":"Authentication","description":"\u0026lt;p\u003e\u0026lt;span style=\"color:rgb(105,118,137);\"\u003eCEIPAL API uses the combination of the User Name, Password and API Key to validate with the client's account to generate the Bearer Token. All the endpoints will be using this Bearer Token to access the data.\u0026lt;/span\u003e\u0026lt;/p\u003e\u0026lt;br\u003e\u0026lt;p\u003e\u0026lt;span style=\"color:rgb(105,118,137);\"\u003eYour API keys carry many privileges, so be sure to keep them secure! Do not share your secret API keys and it is advisable to rotate the API Key frequently for any misuse.\u0026lt;/span\u003e\u0026lt;/p\u003e\u0026lt;br\u003e\u0026lt;p\u003e\u0026lt;span style=\"color:rgb(105,118,137);\"\u003eAll API requests must be made over HTTPS. Calls made over plain HTTP will fail.\u0026lt;/span\u003e\u0026lt;/p\u003e\u0026lt;br\u003e","slug":"authentication","sectionId":"63ec78dd3e80389eda35e255","isHeader":false,"openDefault":false,"subItems":[],"isPrivate":false,"viewers":[],"externalPageLink":"","isNewTab":false,"method":"","urls":{},"_id":"680a49d317a5f52532a918b7"},{"name":"Refresh Token","description":"\u0026lt;p\u003eAuthentication token is valid for 24 hours and to continue using the API, a new auth token needs to be generated. Use the refresh token to generate the new auth token and the refresh token is valid for 7 days.\u0026lt;/p\u003e\u0026lt;br\u003e\u0026lt;p\u003eSend the access token in the headers as Token to get the new access token.\u0026lt;/p\u003e\u0026lt;br\u003e","slug":"refresh-token","sectionId":"63ec78dd3e80389eda35e261","isHeader":false,"openDefault":false,"subItems":[],"isPrivate":false,"viewers":[],"externalPageLink":"","isNewTab":false,"method":"","urls":{},"_id":"680a49d317a5f52532a918b8"},{"name":"Job Postings","description":"\u0026lt;p\u003eThis object represents a job on the client's account. Below are the endpoints that can be used to extract the jobs with various filters. Rate limit applies to these endpoints based on the API Key.\u0026lt;/p\u003e\u0026lt;br\u003e\u0026lt;figure class=\"notification-box-item primary-box ck-widget\"\u003e\u0026lt;div class=\"notification-box-header\"\u003e\u0026lt;p class=\"notification-title\"\u003eTip\u0026lt;/p\u003e\u0026lt;/div\u003e\u0026lt;p class=\"notification-description\"\u003e\u0026lt;span style=\"color:rgb(186,104,200)!important;\"\u003e\u0026lt;code\u003eUse the Custom API to get any other fields as the response this is shown here is standard. Check with your CEIPAL account manager for more details.\u0026lt;/code\u003e\u0026lt;/span\u003e\u0026lt;/p\u003e\u0026lt;/figure\u003e\u0026lt;br\u003e",
